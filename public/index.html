<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#26242c" />
<title>Sticky Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --board-bg: #26242c;
    --board-dot: rgba(255, 255, 255, 0.06);
    --bar-bg: #1d1b22;
    --ink: #4a4744;
    --ui-text: #e7e3da;
    --ui-muted: #9b958c;
    --thread: #d6453a;
    --note-size: 150px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--board-bg);
    color: var(--ui-text);
  }

  .bar {
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    background: var(--bar-bg);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    position: relative;
    z-index: 10;
  }
  .bar h1 {
    font-family: 'Caveat', cursive;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .count { font-size: 13px; color: var(--ui-muted); }
  .status { font-size: 13px; color: #e8a44d; margin-right: auto; }
  .count + .status { margin-left: 4px; }
  .spacer { margin-right: auto; }
  .add-btn {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #2a2730;
    background: #fce98a;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    cursor: pointer;
    transition: transform 0.12s ease, filter 0.12s ease;
  }
  .add-btn:hover { filter: brightness(1.05); }
  .add-btn:active { transform: scale(0.96); }
  .add-btn:focus-visible { outline: 2px solid #fce98a; outline-offset: 2px; }

  /* secondary "Connect" toggle — same shape, quieter colour */
  .connect-btn {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ui-text);
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: transform 0.12s ease, filter 0.12s ease, background 0.12s ease;
  }
  .connect-btn:hover { background: rgba(255, 255, 255, 0.06); }
  .connect-btn:active { transform: scale(0.96); }
  .connect-btn:focus-visible { outline: 2px solid var(--thread); outline-offset: 2px; }
  .connect-btn.active {
    color: #2a2730;
    background: var(--thread);
    border-color: var(--thread);
  }

  .board {
    position: absolute;
    inset: 60px 0 0 0;
    background-color: var(--board-bg);
    background-image: radial-gradient(var(--board-dot) 1.4px, transparent 1.4px);
    background-size: 26px 26px;
    overflow: hidden;
    touch-action: none;
  }
  .board.connect-mode { cursor: crosshair; }
  .board.connect-mode .note { cursor: crosshair; }

  /* thread overlay — drawn over the notes, never intercepts pointer events */
  .threads {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 100000;
  }
  .thread {
    stroke: var(--thread);
    stroke-width: 2;
    stroke-linecap: round;
    opacity: 0.85;
  }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--ui-muted);
    pointer-events: none;
    text-align: center;
    padding: 24px;
  }
  .empty .big { font-family: 'Caveat', cursive; font-size: 32px; color: #6f6a62; }
  .empty .small { font-size: 14px; }

  .note {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--note-size);
    min-height: 48px;
    background: var(--c, #fce98a);
    padding: 20px 16px 14px;
    cursor: grab;
    box-shadow: 0 1px 1px rgba(0,0,0,0.18), 0 8px 16px rgba(0,0,0,0.28);
    border-radius: 2px;
    transition: box-shadow 0.15s ease;
    will-change: transform;
    display: flex;
    flex-direction: column;
  }
  .note::after {
    content: "";
    position: absolute;
    right: 0; bottom: 0;
    width: 26px; height: 26px;
    background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.10) 50%);
    border-bottom-right-radius: 2px;
  }
  .note.dragging {
    cursor: grabbing;
    box-shadow: 0 6px 8px rgba(0,0,0,0.22), 0 22px 40px rgba(0,0,0,0.40);
  }
  .note.editing { cursor: text; }
  .note.connect-src { outline: 2px dashed var(--thread); outline-offset: 3px; }

  .pin {
    position: absolute;
    top: -7px;
    left: 50%;
    width: 15px; height: 15px;
    margin-left: -7.5px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff9a8b, #d6453a 70%);
    box-shadow: 0 2px 3px rgba(0,0,0,0.35);
  }

  /* ---- title (first line, always shown) ---- */
  .note .title {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.25;
    font-weight: 600;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .note .title.placeholder { color: rgba(74,71,68,0.45); }

  /* ---- body (the rest, shown only when the note is selected) ---- */
  .note .body {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(74,71,68,0.18);
    font-family: 'Caveat', cursive;
    font-size: 17px;
    line-height: 1.3;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .note.selected .body { display: block; }

  /* ---- editing textarea (full text, replaces title/body) ---- */
  .note textarea {
    display: none;
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.3;
    color: var(--ink);
    overflow: hidden;
    cursor: text;
  }
  .note.editing textarea { display: block; }
  .note.editing .title,
  .note.editing .body { display: none; }
  .note textarea::placeholder { color: rgba(74,71,68,0.45); }

  /* ---- per-note toolbar ---- */
  .toolbar {
    position: absolute;
    top: -42px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    background: #2f2c36;
    border-radius: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    white-space: nowrap;
  }
  .note.selected .toolbar { display: flex; }
  .swatch {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
  }
  .swatch.active { border-color: #fff; }
  .swatch:focus-visible { outline: 2px solid #fff; outline-offset: 1px; }
  .tool-del {
    width: 26px; height: 26px;
    margin-left: 2px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    border-radius: 50%;
    color: #d89c9c;
    cursor: pointer;
  }
  .tool-del:hover { background: rgba(214,69,58,0.2); color: #ff7a6c; }
  .tool-del svg { width: 15px; height: 15px; }

  @media (prefers-reduced-motion: reduce) {
    .note, .add-btn, .connect-btn { transition: none; }
  }
</style>
</head>
<body>
  <div class="bar">
    <h1>Sticky Board</h1>
    <span class="count" id="count"></span>
    <span class="status" id="status"></span>
    <span class="spacer"></span>
    <button class="connect-btn" id="connect">Connect</button>
    <button class="add-btn" id="add">+ New note</button>
  </div>

  <div class="board" id="board">
    <svg class="threads" id="threads" aria-hidden="true"></svg>
    <div class="empty" id="empty">
      <div class="big">Nothing here yet</div>
      <div class="small">Double-click anywhere, or hit “+ New note”.</div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  const COLORS = ["#fce98a", "#f7a8c0", "#a6d8f2", "#b7e4a0", "#fbc079", "#cbb6e8"];
  const NOTE = 150;
  const SVGNS = "http://www.w3.org/2000/svg";

  const board = document.getElementById("board");
  const empty = document.getElementById("empty");
  const countEl = document.getElementById("count");
  const statusEl = document.getElementById("status");
  const threadSvg = document.getElementById("threads");
  const connectBtn = document.getElementById("connect");

  let notes = [];              // [{id, text, color, x, y, rot, z}]
  let threads = [];            // [{id, a, b}]
  const els = new Map();       // note id -> element
  const threadEls = new Map(); // thread id -> <line>
  let maxZ = 1;
  let selectedId = null;
  let editingId = null;

  // connect mode
  let connectMode = false;
  let connectFirst = null;     // first picked note id

  /* ---------- storage: the Worker + D1 API ---------- */
  let statusTimer = null;
  function flagSync() {
    statusEl.textContent = "⚠ sync error";
    clearTimeout(statusTimer);
    statusTimer = setTimeout(function () { statusEl.textContent = ""; }, 4000);
  }

  const API = {
    async list() {
      const r = await fetch("/api/notes");
      if (!r.ok) throw new Error("load failed: " + r.status);
      return await r.json();
    },
    async upsert(n) {
      try {
        await fetch("/api/notes/" + encodeURIComponent(n.id), {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ text: n.text, color: n.color, x: n.x, y: n.y, rot: n.rot, z: n.z })
        });
      } catch (e) { console.error("save failed", e); flagSync(); }
    },
    async remove(id) {
      try {
        await fetch("/api/notes/" + encodeURIComponent(id), { method: "DELETE" });
      } catch (e) { console.error("delete failed", e); flagSync(); }
    },
    async listThreads() {
      const r = await fetch("/api/threads");
      if (!r.ok) throw new Error("threads load failed: " + r.status);
      return await r.json();
    },
    async upsertThread(t) {
      try {
        await fetch("/api/threads/" + encodeURIComponent(t.id), {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ a: t.a, b: t.b })
        });
      } catch (e) { console.error("thread save failed", e); flagSync(); }
    },
    async removeThread(id) {
      try {
        await fetch("/api/threads/" + encodeURIComponent(id), { method: "DELETE" });
      } catch (e) { console.error("thread delete failed", e); flagSync(); }
    }
  };

  /* ---------- helpers ---------- */
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

  function clampNote(n) {
    n.x = clamp(n.x, 0, Math.max(0, board.clientWidth  - NOTE));
    n.y = clamp(n.y, 0, Math.max(0, board.clientHeight - NOTE));
  }

  function applyTransform(el, n, lift) {
    const rot = lift ? n.rot * 0.35 : n.rot;
    const scale = lift ? 1.05 : 1;
    el.style.transform =
      "translate(" + n.x + "px," + n.y + "px) rotate(" + rot + "deg) scale(" + scale + ")";
  }

  function updateChrome() {
    const n = notes.length;
    countEl.textContent = n ? n + (n === 1 ? " note" : " notes") : "";
    empty.style.display = n ? "none" : "flex";
  }

  // first line is the title, the rest is the body
  function splitText(t) {
    t = t || "";
    const i = t.indexOf("\n");
    return i === -1 ? [t, ""] : [t.slice(0, i), t.slice(i + 1)];
  }

  /* ---------- build a note element ---------- */
  function makeEl(n) {
    const el = document.createElement("div");
    el.className = "note";
    el.dataset.id = n.id;
    el.style.setProperty("--c", n.color);
    el.style.zIndex = n.z;
    applyTransform(el, n, false);

    const pin = document.createElement("div");
    pin.className = "pin";
    el.appendChild(pin);

    const tb = document.createElement("div");
    tb.className = "toolbar";
    COLORS.forEach(function (c) {
      const s = document.createElement("button");
      s.className = "swatch" + (c === n.color ? " active" : "");
      s.style.background = c;
      s.dataset.color = c;
      s.setAttribute("aria-label", "Set colour");
      tb.appendChild(s);
    });
    const del = document.createElement("button");
    del.className = "tool-del";
    del.setAttribute("aria-label", "Delete note");
    del.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>';
    tb.appendChild(del);
    el.appendChild(tb);

    const title = document.createElement("div");
    title.className = "title";
    el.appendChild(title);

    const body = document.createElement("div");
    body.className = "body";
    el.appendChild(body);

    const ta = document.createElement("textarea");
    ta.value = n.text;
    ta.readOnly = true;
    ta.placeholder = "Write a task…";
    ta.setAttribute("aria-label", "Note text");
    el.appendChild(ta);

    renderText(el, n);
    board.appendChild(el);
    els.set(n.id, el);
    return el;
  }

  // refresh the read-only title/body view from n.text
  function renderText(el, n) {
    const parts = splitText(n.text);
    const title = parts[0], bodyText = parts[1];
    const tEl = el.querySelector(".title");
    const bEl = el.querySelector(".body");
    if (title.length === 0) {
      tEl.textContent = "Write a task…";
      tEl.classList.add("placeholder");
    } else {
      tEl.textContent = title;
      tEl.classList.remove("placeholder");
    }
    bEl.textContent = bodyText;
    bEl.hidden = bodyText.length === 0;
  }

  function autoGrow(ta) {
    ta.style.height = "auto";
    ta.style.height = Math.max(80, ta.scrollHeight) + "px";
  }

  /* ---------- selection ---------- */
  function select(id) {
    if (selectedId && els.has(selectedId)) els.get(selectedId).classList.remove("selected");
    selectedId = id;
    if (id && els.has(id)) els.get(id).classList.add("selected");
  }

  function bringToFront(n, el) {
    n.z = ++maxZ;
    el.style.zIndex = n.z;
  }

  /* ---------- editing ---------- */
  function startEdit(n, el) {
    if (connectMode) return;
    editingId = n.id;
    el.classList.add("editing");
    const ta = el.querySelector("textarea");
    ta.readOnly = false;
    autoGrow(ta);
    ta.focus();
    const len = ta.value.length;
    ta.setSelectionRange(len, len);
  }
  function stopEdit() {
    if (!editingId) return;
    const el = els.get(editingId);
    if (el) {
      const ta = el.querySelector("textarea");
      ta.readOnly = true;
      el.classList.remove("editing");
      const n = notes.find(x => x.id === editingId);
      if (n) { n.text = ta.value; renderText(el, n); API.upsert(n); }
    }
    editingId = null;
  }

  /* ---------- create / delete / colour ---------- */
  function addNote(x, y) {
    const id = uid();
    const n = {
      id: id,
      text: "",
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      x: (x == null ? board.clientWidth / 2 - NOTE / 2 + (Math.random() * 60 - 30) : x - NOTE / 2),
      y: (y == null ? board.clientHeight / 2 - NOTE / 2 + (Math.random() * 60 - 30) : y - NOTE / 2),
      rot: Math.random() * 8 - 4,
      z: ++maxZ
    };
    clampNote(n);
    notes.push(n);
    const el = makeEl(n);
    select(id);
    startEdit(n, el);
    updateChrome();
    API.upsert(n);
  }

  function deleteNote(id) {
    const i = notes.findIndex(x => x.id === id);
    if (i === -1) return;

    // drop any threads attached to this note first
    threads.slice().forEach(function (t) {
      if (t.a === id || t.b === id) removeThreadLocal(t.id, true);
    });

    notes.splice(i, 1);
    const el = els.get(id);
    if (el) el.remove();
    els.delete(id);
    if (selectedId === id) selectedId = null;
    if (editingId === id) editingId = null;
    if (connectFirst === id) connectFirst = null;
    updateChrome();
    API.remove(id);
  }

  function recolor(n, el, color) {
    n.color = color;
    el.style.setProperty("--c", color);
    el.querySelectorAll(".swatch").forEach(function (s) {
      s.classList.toggle("active", s.dataset.color === color);
    });
    API.upsert(n);
  }

  /* ---------- threads ---------- */
  function anchor(n) {
    // tie the string to the pin: top-centre of the note (height-independent)
    return { x: n.x + NOTE / 2, y: n.y };
  }

  function findThreadBetween(a, b) {
    return threads.find(function (t) {
      return (t.a === a && t.b === b) || (t.a === b && t.b === a);
    });
  }

  function makeThreadEl(t) {
    const line = document.createElementNS(SVGNS, "line");
    line.setAttribute("class", "thread");
    threadSvg.appendChild(line);
    threadEls.set(t.id, line);
    positionThread(t);
  }

  function positionThread(t) {
    const line = threadEls.get(t.id);
    if (!line) return;
    const na = notes.find(x => x.id === t.a);
    const nb = notes.find(x => x.id === t.b);
    if (!na || !nb) { line.style.display = "none"; return; }
    line.style.display = "";
    const a = anchor(na), b = anchor(nb);
    line.setAttribute("x1", a.x);
    line.setAttribute("y1", a.y);
    line.setAttribute("x2", b.x);
    line.setAttribute("y2", b.y);
  }

  function positionAllThreads() {
    threads.forEach(positionThread);
  }

  function positionThreadsFor(noteId) {
    threads.forEach(function (t) {
      if (t.a === noteId || t.b === noteId) positionThread(t);
    });
  }

  function addThread(a, b) {
    const t = { id: uid(), a: a, b: b };
    threads.push(t);
    makeThreadEl(t);
    API.upsertThread(t);
  }

  function removeThreadLocal(id, alsoRemote) {
    const i = threads.findIndex(x => x.id === id);
    if (i === -1) return;
    threads.splice(i, 1);
    const line = threadEls.get(id);
    if (line) line.remove();
    threadEls.delete(id);
    if (alsoRemote) API.removeThread(id);
  }

  /* ---------- connect mode ---------- */
  function clearConnectFirst() {
    if (connectFirst && els.has(connectFirst)) els.get(connectFirst).classList.remove("connect-src");
    connectFirst = null;
  }

  function setConnectMode(on) {
    connectMode = on;
    board.classList.toggle("connect-mode", on);
    connectBtn.classList.toggle("active", on);
    clearConnectFirst();
    if (on) {
      select(null);
      stopEdit();
      statusEl.textContent = "Connect: pick two notes";
    } else if (statusEl.textContent.indexOf("Connect") === 0) {
      statusEl.textContent = "";
    }
  }

  connectBtn.addEventListener("click", function () { setConnectMode(!connectMode); });

  /* ---------- drag (pointer events: mouse + touch) ---------- */
  let drag = null;

  board.addEventListener("pointerdown", function (e) {
    const el = e.target.closest(".note");

    // ----- connect mode: clicks pick endpoints, nothing else -----
    if (connectMode) {
      if (!el) { clearConnectFirst(); return; }
      const id = el.dataset.id;
      if (!notes.find(x => x.id === id)) return;
      if (connectFirst === null) {
        connectFirst = id;
        el.classList.add("connect-src");
      } else if (connectFirst === id) {
        clearConnectFirst();
      } else {
        const existing = findThreadBetween(connectFirst, id);
        if (existing) removeThreadLocal(existing.id, true); // toggle off
        else addThread(connectFirst, id);
        clearConnectFirst();
      }
      return;
    }

    // clicked empty board -> deselect
    if (!el) { select(null); stopEdit(); return; }

    const id = el.dataset.id;
    const n = notes.find(x => x.id === id);
    if (!n) return;

    const swatch = e.target.closest(".swatch");
    if (swatch) { recolor(n, el, swatch.dataset.color); return; }
    if (e.target.closest(".tool-del")) { deleteNote(id); return; }

    select(id);
    bringToFront(n, el);

    if (editingId === id) return;

    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    el.classList.add("dragging");
    applyTransform(el, n, true);
    drag = { id: id, el: el, n: n, startX: e.clientX, startY: e.clientY, baseX: n.x, baseY: n.y, moved: false };
  });

  board.addEventListener("pointermove", function (e) {
    if (!drag) return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
    drag.n.x = drag.baseX + dx;
    drag.n.y = drag.baseY + dy;
    clampNote(drag.n);
    applyTransform(drag.el, drag.n, true);
    positionThreadsFor(drag.id);
  });

  function endDrag(e) {
    if (!drag) return;
    const d = drag; drag = null;
    d.el.classList.remove("dragging");
    applyTransform(d.el, d.n, false);
    positionThreadsFor(d.id);
    try { d.el.releasePointerCapture(e.pointerId); } catch (_) {}
    if (d.moved) API.upsert(d.n);
  }
  board.addEventListener("pointerup", endDrag);
  board.addEventListener("pointercancel", endDrag);

  /* ---------- editing triggers ---------- */
  board.addEventListener("dblclick", function (e) {
    if (connectMode) return;
    const el = e.target.closest(".note");
    if (el) {
      const n = notes.find(x => x.id === el.dataset.id);
      if (n) { select(n.id); startEdit(n, el); }
    } else {
      const r = board.getBoundingClientRect();
      addNote(e.clientX - r.left, e.clientY - r.top);
    }
  });

  board.addEventListener("input", function (e) {
    if (e.target.tagName === "TEXTAREA") autoGrow(e.target);
  });

  board.addEventListener("focusout", function (e) {
    if (e.target.tagName === "TEXTAREA") stopEdit();
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (connectMode) { setConnectMode(false); return; }
      if (editingId) { stopEdit(); return; }
    }
    if ((e.key === "Delete" || e.key === "Backspace") && selectedId && !editingId && !connectMode) {
      e.preventDefault();
      deleteNote(selectedId);
    }
  });

  document.getElementById("add").addEventListener("click", function () { addNote(); });

  window.addEventListener("resize", function () {
    notes.forEach(function (n) {
      clampNote(n);
      const el = els.get(n.id);
      if (el && (!drag || drag.id !== n.id)) applyTransform(el, n, false);
    });
    positionAllThreads();
  });

  /* ---------- init ---------- */
  (async function init() {
    try {
      notes = await API.list();
    } catch (e) {
      console.error(e);
      empty.querySelector(".big").textContent = "Couldn't reach the server";
      empty.querySelector(".small").textContent = "The board can't load right now — try refreshing.";
      empty.style.display = "flex";
      return;
    }
    maxZ = notes.reduce((m, n) => Math.max(m, n.z || 1), 1);
    notes.forEach(function (n) {
      if (typeof n.rot !== "number") n.rot = Math.random() * 8 - 4;
      clampNote(n);
      makeEl(n);
    });
    updateChrome();

    // threads are best-effort: if the API isn't deployed yet, just skip them
    try {
      threads = await API.listThreads();
    } catch (e) {
      console.error(e);
      threads = [];
    }
    threads = threads.filter(function (t) {
      return els.has(t.a) && els.has(t.b);
    });
    threads.forEach(makeThreadEl);
  })();
})();
</script>
</body>

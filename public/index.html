<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#26242c" />
<title>Sticky Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --board-bg: #26242c;
    --board-dot: rgba(255, 255, 255, 0.06);
    --bar-bg: #1d1b22;
    --ink: #4a4744;
    --ui-text: #e7e3da;
    --ui-muted: #9b958c;
    --thread: #d6453a;
    --note-size: 150px;
    --note-h: 60px;   /* a resting (collapsed) note's height — used to size the pad */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--board-bg);
    color: var(--ui-text);
  }

  .bar {
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    background: var(--bar-bg);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    position: relative;
    z-index: 10;
  }
  .bar h1 {
    font-family: 'Caveat', cursive;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .count { font-size: 13px; color: var(--ui-muted); }
  .status { font-size: 13px; color: #e8a44d; margin-left: 4px; }

  .board {
    position: absolute;
    inset: 60px 0 0 0;
    background-color: var(--board-bg);
    background-image: radial-gradient(var(--board-dot) 1.4px, transparent 1.4px);
    background-size: 26px 26px;
    overflow: hidden;
    touch-action: none;
  }
  .board.linking { cursor: crosshair; }
  .board.pulling { cursor: grabbing; }
  /* while dragging a new string, don't let existing strings steal the drop */
  .board.linking .thread-hit { pointer-events: none; }

  /* ---- the pad you peel notes from ---- */
  .pad {
    position: absolute;
    top: 16px; right: 16px;
    width: var(--note-size); height: var(--note-h);
    z-index: 6;
    cursor: grab;
    touch-action: none;
  }
  .pad:active { cursor: grabbing; }
  .pad-sheet {
    position: absolute;
    inset: 0;
    border-radius: 2px;
    background: var(--c, #fce98a); /* the colour of the next note to be peeled */
    box-shadow: 0 1px 1px rgba(0,0,0,0.18), 0 6px 12px rgba(0,0,0,0.28);
    transition: transform 0.12s ease;
  }
  .pad-sheet.s1 { transform: rotate(-1deg); }
  .pad-sheet.s2 { transform: rotate(3deg) translate(2px, 1px); filter: brightness(0.94); z-index: -1; }
  .pad-sheet.s3 { transform: rotate(-5deg) translate(-2px, 2px); filter: brightness(0.86); z-index: -2; }
  .pad:hover .pad-sheet.s1 { transform: rotate(-1deg) translateY(-3px); }
  .pad-plus {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 500;
    color: #2a2730;
    opacity: 0.4;
    pointer-events: none;
  }
  /* an e-reader page turn: the peeled sheet is a 3D page hinged on its left
     edge. It follows the pointer and its turn angle tracks how far you pull. */
  .curl {
    position: absolute;
    top: 16px; right: 16px;
    width: var(--note-size); height: var(--note-h);
    z-index: 99999;
    perspective: 1000px;
    pointer-events: none;
    will-change: transform;
  }
  .curl-inner {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transform-origin: left center; /* hinge on the spine */
    will-change: transform;
  }
  .curl-face {
    position: absolute;
    inset: 0;
    border-radius: 2px;
    backface-visibility: hidden;
    box-shadow: 0 10px 22px rgba(0,0,0,0.32);
  }
  .curl-front {
    background: var(--c, #fce98a);
    background-image: linear-gradient(to left, rgba(0,0,0,0) 55%, rgba(0,0,0,0.22)); /* fold shadow toward the hinge */
  }
  .curl-back {
    background: #efe7d6; /* the paper back */
    transform: rotateY(180deg);
    background-image: linear-gradient(to right, rgba(0,0,0,0) 55%, rgba(0,0,0,0.16));
  }

  /* thread overlay — drawn over the notes; only the strings take pointer events */
  .threads {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 100000;
  }
  .thread {
    fill: none;
    stroke: var(--thread);
    stroke-width: 2;
    stroke-linecap: round;
    opacity: 0.85;
    pointer-events: none;
  }
  .thread-hit {
    fill: none;
    stroke: transparent;
    stroke-width: 14;
    stroke-linecap: round;
    pointer-events: stroke;
    cursor: grab;
  }
  .thread-hit:hover + .thread { stroke-width: 3; opacity: 1; }
  .thread-temp { opacity: 0.9; stroke-dasharray: 4 6; }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--ui-muted);
    pointer-events: none;
    text-align: center;
    padding: 24px;
  }
  .empty .big { font-family: 'Caveat', cursive; font-size: 32px; color: #6f6a62; }
  .empty .small { font-size: 14px; }

  .note {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--note-size);
    min-height: 48px;
    background: var(--c, #fce98a);
    padding: 20px 16px 14px;
    cursor: grab;
    box-shadow: 0 1px 1px rgba(0,0,0,0.18), 0 8px 16px rgba(0,0,0,0.28);
    border-radius: 2px;
    transition: box-shadow 0.15s ease;
    will-change: transform;
    display: flex;
    flex-direction: column;
  }
  .note::after {
    content: "";
    position: absolute;
    right: 0; bottom: 0;
    width: 26px; height: 26px;
    background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.10) 50%);
    border-bottom-right-radius: 2px;
  }
  .note.dragging {
    cursor: grabbing;
    box-shadow: 0 6px 8px rgba(0,0,0,0.22), 0 22px 40px rgba(0,0,0,0.40);
  }
  .note.editing { cursor: text; }
  .note.link-target { outline: 2px dashed var(--thread); outline-offset: 3px; }

  .pin {
    position: absolute;
    top: -7px;
    left: 50%;
    width: 15px; height: 15px;
    margin-left: -7.5px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff9a8b, #d6453a 70%);
    box-shadow: 0 2px 3px rgba(0,0,0,0.35);
    cursor: crosshair;
    transition: transform 0.12s ease;
  }
  /* enlarge the pin's clickable area so it's easy to grab */
  .pin::before {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
  }
  .note:not(.editing) .pin:hover { transform: scale(1.18); }

  /* ---- title (first line, always shown) ---- */
  .note .title {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.25;
    font-weight: 600;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .note .title.placeholder { color: rgba(74,71,68,0.45); }

  /* ---- body (the rest, shown only when the note is selected) ---- */
  .note .body {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(74,71,68,0.18);
    font-family: 'Caveat', cursive;
    font-size: 17px;
    line-height: 1.3;
    color: var(--ink);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .note.selected .body { display: block; }

  /* ---- editing textarea (full text, replaces title/body) ---- */
  .note textarea {
    display: none;
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.3;
    color: var(--ink);
    overflow: hidden;
    cursor: text;
  }
  .note.editing textarea { display: block; }
  .note.editing .title,
  .note.editing .body { display: none; }
  .note textarea::placeholder { color: rgba(74,71,68,0.45); }

  /* ---- per-note toolbar ---- */
  .toolbar {
    position: absolute;
    top: -42px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    background: #2f2c36;
    border-radius: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    white-space: nowrap;
  }
  .note.selected .toolbar { display: flex; }
  .swatch {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
  }
  .swatch.active { border-color: #fff; }
  .swatch:focus-visible { outline: 2px solid #fff; outline-offset: 1px; }
  .tool-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.16); margin: 0 2px; }
  .tool-z {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    border-radius: 50%;
    color: #cfc9bf;
    cursor: pointer;
  }
  .tool-z:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .tool-z svg { width: 15px; height: 15px; }
  .tool-del {
    width: 26px; height: 26px;
    margin-left: 2px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    border-radius: 50%;
    color: #d89c9c;
    cursor: pointer;
  }
  .tool-del:hover { background: rgba(214,69,58,0.2); color: #ff7a6c; }
  .tool-del svg { width: 15px; height: 15px; }

  @media (prefers-reduced-motion: reduce) {
    .note, .pad-sheet, .pin { transition: none; }
  }
</style>
</head>
<body>
  <div class="bar">
    <h1>Sticky Board</h1>
    <span class="count" id="count"></span>
    <span class="status" id="status"></span>
  </div>

  <div class="board" id="board">
    <svg class="threads" id="threads" aria-hidden="true"></svg>

    <div class="pad" id="pad" title="Peel a note onto the board" role="button" aria-label="Peel a new note">
      <span class="pad-sheet s3"></span>
      <span class="pad-sheet s2"></span>
      <span class="pad-sheet s1"></span>
      <span class="pad-plus">+</span>
    </div>

    <div class="empty" id="empty">
      <div class="big">Nothing here yet</div>
      <div class="small">Double-click anywhere, or peel one from the pad.</div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  const COLORS = ["#fce98a", "#f7a8c0", "#a6d8f2", "#b7e4a0", "#fbc079", "#cbb6e8"];
  const NOTE = 150;
  const SVGNS = "http://www.w3.org/2000/svg";
  const BREAK_PULL = 120; // how far you must pull a string before it snaps
  const PEEL_COMMIT = 110; // how far you pull a page off the pad before it fully turns

  const board = document.getElementById("board");
  const empty = document.getElementById("empty");
  const countEl = document.getElementById("count");
  const statusEl = document.getElementById("status");
  const threadSvg = document.getElementById("threads");
  const pad = document.getElementById("pad");

  let notes = [];              // [{id, text, color, x, y, rot, z}]
  let threads = [];            // [{id, a, b}]
  const els = new Map();       // note id -> element
  const threadEls = new Map(); // thread id -> {hit, vis}
  let maxZ = 1;
  let selectedId = null;
  let editingId = null;

  let drag = null;             // note drag: {id, el, n, ..., isNew}
  let padPeel = null;          // armed peel: {pointerId, startX, startY}
  let peelCurl = null;         // page-turn in progress: {pointerId, el, color, pendingNext, ...}
  let nextColor = COLORS[0];   // colour shown on the pad = the next note's colour
  let link = null;             // linking drag: {fromId, pointerId}
  let linkTarget = null;       // note id currently hovered as a link target
  let linkTempEl = null;       // temporary <path> shown while dragging a string
  let pull = null;             // pulling a string to break it: {id, pointerId}

  /* ---------- storage: the Worker + D1 API ---------- */
  let statusTimer = null;
  function flagSync() {
    statusEl.textContent = "⚠ sync error";
    clearTimeout(statusTimer);
    statusTimer = setTimeout(function () { statusEl.textContent = ""; }, 4000);
  }

  const API = {
    async list() {
      const r = await fetch("/api/notes");
      if (!r.ok) throw new Error("load failed: " + r.status);
      return await r.json();
    },
    async upsert(n) {
      try {
        await fetch("/api/notes/" + encodeURIComponent(n.id), {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ text: n.text, color: n.color, x: n.x, y: n.y, rot: n.rot, z: n.z })
        });
      } catch (e) { console.error("save failed", e); flagSync(); }
    },
    async remove(id) {
      try {
        await fetch("/api/notes/" + encodeURIComponent(id), { method: "DELETE" });
      } catch (e) { console.error("delete failed", e); flagSync(); }
    },
    async listThreads() {
      const r = await fetch("/api/threads");
      if (!r.ok) throw new Error("threads load failed: " + r.status);
      return await r.json();
    },
    async upsertThread(t) {
      try {
        await fetch("/api/threads/" + encodeURIComponent(t.id), {
          method: "PUT",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ a: t.a, b: t.b })
        });
      } catch (e) { console.error("thread save failed", e); flagSync(); }
    },
    async removeThread(id) {
      try {
        await fetch("/api/threads/" + encodeURIComponent(id), { method: "DELETE" });
      } catch (e) { console.error("thread delete failed", e); flagSync(); }
    }
  };

  /* ---------- helpers ---------- */
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

  function clampNote(n) {
    n.x = clamp(n.x, 0, Math.max(0, board.clientWidth  - NOTE));
    n.y = clamp(n.y, 0, Math.max(0, board.clientHeight - NOTE));
  }

  function applyTransform(el, n, lift) {
    const rot = lift ? n.rot * 0.35 : n.rot;
    const scale = lift ? 1.05 : 1;
    el.style.transform =
      "translate(" + n.x + "px," + n.y + "px) rotate(" + rot + "deg) scale(" + scale + ")";
  }

  function updateChrome() {
    const n = notes.length;
    countEl.textContent = n ? n + (n === 1 ? " note" : " notes") : "";
    empty.style.display = n ? "none" : "flex";
  }

  // first line is the title, the rest is the body
  function splitText(t) {
    t = t || "";
    const i = t.indexOf("\n");
    return i === -1 ? [t, ""] : [t.slice(0, i), t.slice(i + 1)];
  }

  /* ---------- build a note element ---------- */
  function makeEl(n) {
    const el = document.createElement("div");
    el.className = "note";
    el.dataset.id = n.id;
    el.style.setProperty("--c", n.color);
    el.style.zIndex = n.z;
    applyTransform(el, n, false);

    const pin = document.createElement("div");
    pin.className = "pin";
    pin.title = "Drag to another note to connect";
    el.appendChild(pin);

    const tb = document.createElement("div");
    tb.className = "toolbar";
    COLORS.forEach(function (c) {
      const s = document.createElement("button");
      s.className = "swatch" + (c === n.color ? " active" : "");
      s.style.background = c;
      s.dataset.color = c;
      s.setAttribute("aria-label", "Set colour");
      tb.appendChild(s);
    });

    const sep = document.createElement("span");
    sep.className = "tool-sep";
    tb.appendChild(sep);

    const back = document.createElement("button");
    back.className = "tool-z tool-back";
    back.setAttribute("aria-label", "Send to back");
    back.title = "Send to back";
    back.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v13M6 11l6 6 6-6"/></svg>';
    tb.appendChild(back);

    const front = document.createElement("button");
    front.className = "tool-z tool-front";
    front.setAttribute("aria-label", "Bring to front");
    front.title = "Bring to front";
    front.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V7M6 13l6-6 6 6"/></svg>';
    tb.appendChild(front);

    const del = document.createElement("button");
    del.className = "tool-del";
    del.setAttribute("aria-label", "Delete note");
    del.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>';
    tb.appendChild(del);
    el.appendChild(tb);

    const title = document.createElement("div");
    title.className = "title";
    el.appendChild(title);

    const body = document.createElement("div");
    body.className = "body";
    el.appendChild(body);

    const ta = document.createElement("textarea");
    ta.value = n.text;
    ta.readOnly = true;
    ta.placeholder = "Write a task…";
    ta.setAttribute("aria-label", "Note text");
    el.appendChild(ta);

    renderText(el, n);
    board.appendChild(el);
    els.set(n.id, el);
    return el;
  }

  // refresh the read-only title/body view from n.text
  function renderText(el, n) {
    const parts = splitText(n.text);
    const title = parts[0], bodyText = parts[1];
    const tEl = el.querySelector(".title");
    const bEl = el.querySelector(".body");
    if (title.length === 0) {
      tEl.textContent = "Write a task…";
      tEl.classList.add("placeholder");
    } else {
      tEl.textContent = title;
      tEl.classList.remove("placeholder");
    }
    bEl.textContent = bodyText;
    bEl.hidden = bodyText.length === 0;
  }

  function autoGrow(ta) {
    ta.style.height = "auto";
    ta.style.height = Math.max(80, ta.scrollHeight) + "px";
  }

  /* ---------- selection ---------- */
  function select(id) {
    if (selectedId && els.has(selectedId)) els.get(selectedId).classList.remove("selected");
    selectedId = id;
    if (id && els.has(id)) els.get(id).classList.add("selected");
  }

  function bringToFront(n, el) {
    n.z = ++maxZ;
    el.style.zIndex = n.z;
  }

  function sendToBack(n, el) {
    const minZ = notes.reduce((m, x) => Math.min(m, x.z || 1), maxZ);
    n.z = minZ - 1;
    el.style.zIndex = n.z;
    API.upsert(n);
  }

  /* ---------- editing ---------- */
  function startEdit(n, el) {
    editingId = n.id;
    el.classList.add("editing");
    const ta = el.querySelector("textarea");
    ta.readOnly = false;
    autoGrow(ta);
    ta.focus();
    const len = ta.value.length;
    ta.setSelectionRange(len, len);
  }
  function stopEdit() {
    if (!editingId) return;
    const el = els.get(editingId);
    if (el) {
      const ta = el.querySelector("textarea");
      ta.readOnly = true;
      el.classList.remove("editing");
      const n = notes.find(x => x.id === editingId);
      if (n) { n.text = ta.value; renderText(el, n); API.upsert(n); }
    }
    editingId = null;
  }

  /* ---------- create / delete / colour ---------- */
  function makeNote(x, y, color) {
    const n = {
      id: uid(),
      text: "",
      color: color || randomColor(),
      x: x,
      y: y,
      rot: Math.random() * 8 - 4,
      z: ++maxZ
    };
    clampNote(n);
    notes.push(n);
    const el = makeEl(n);
    updateChrome();
    API.upsert(n);
    return { n: n, el: el };
  }

  // double-click on empty board -> drop a note there and edit it
  function addNoteAt(cx, cy) {
    const made = makeNote(cx - NOTE / 2, cy - NOTE / 2);
    select(made.n.id);
    startEdit(made.n, made.el);
  }

  function deleteNote(id) {
    const i = notes.findIndex(x => x.id === id);
    if (i === -1) return;

    // drop any threads attached to this note first
    threads.slice().forEach(function (t) {
      if (t.a === id || t.b === id) removeThreadLocal(t.id, true);
    });

    notes.splice(i, 1);
    const el = els.get(id);
    if (el) el.remove();
    els.delete(id);
    if (selectedId === id) selectedId = null;
    if (editingId === id) editingId = null;
    updateChrome();
    API.remove(id);
  }

  function recolor(n, el, color) {
    n.color = color;
    el.style.setProperty("--c", color);
    el.querySelectorAll(".swatch").forEach(function (s) {
      s.classList.toggle("active", s.dataset.color === color);
    });
    API.upsert(n);
  }

  /* ---------- peel a fresh note from the pad (e-reader page turn) ---------- */
  function randomColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }

  function setPadColor(c) { pad.style.setProperty("--c", c); }

  // press the pad to arm a peel; the page only turns once you pull away
  function armPeel(e) {
    e.preventDefault();
    padPeel = { pointerId: e.pointerId, startX: e.clientX, startY: e.clientY };
    try { pad.setPointerCapture(e.pointerId); } catch (_) {}
  }

  function cancelPeel() {
    if (!padPeel) return;
    try { pad.releasePointerCapture(padPeel.pointerId); } catch (_) {}
    padPeel = null;
  }

  // build the 3D page pinned to the pad and start tracking the turn
  function startCurl(e, startX, startY) {
    const curl = document.createElement("div");
    curl.className = "curl";
    curl.style.setProperty("--c", nextColor);
    const inner = document.createElement("div");
    inner.className = "curl-inner";
    const back = document.createElement("div");
    back.className = "curl-face curl-back";
    const front = document.createElement("div");
    front.className = "curl-face curl-front";
    inner.appendChild(back);
    inner.appendChild(front);
    curl.appendChild(inner);
    board.appendChild(curl);

    // reveal the NEXT note's colour on the pad, beneath the turning page
    const pendingNext = randomColor();
    setPadColor(pendingNext);

    peelCurl = { pointerId: e.pointerId, startX: startX, startY: startY, el: curl, inner: inner, color: nextColor, pendingNext: pendingNext };
    try { board.setPointerCapture(e.pointerId); } catch (_) {}
    updateCurl(e);
  }

  // returns true once the page has fully turned and a real note takes over
  function updateCurl(e) {
    const dx = e.clientX - peelCurl.startX;
    const dy = e.clientY - peelCurl.startY;
    const dist = Math.hypot(dx, dy);
    if (dist >= PEEL_COMMIT) { commitCurl(e); return true; }
    const angle = (dist / PEEL_COMMIT) * 165;
    peelCurl.el.style.transform = "translate(" + dx + "px," + dy + "px)";  // follow the pointer
    peelCurl.inner.style.transform = "rotateY(" + angle + "deg)";          // turn the page
    return false;
  }

  // the page is off the pad -> a real note takes over and follows the pointer
  function commitCurl(e) {
    const color = peelCurl.color;
    peelCurl.el.remove();
    nextColor = peelCurl.pendingNext; // the pad already shows this colour
    peelCurl = null;

    const r = board.getBoundingClientRect();
    const made = makeNote(e.clientX - r.left - NOTE / 2, e.clientY - r.top - NOTE / 2, color);
    const n = made.n, el = made.el;
    select(n.id);
    bringToFront(n, el);
    try { el.setPointerCapture(e.pointerId); } catch (_) {}
    el.classList.add("dragging");
    applyTransform(el, n, true);
    drag = { id: n.id, el: el, n: n, startX: e.clientX, startY: e.clientY, baseX: n.x, baseY: n.y, moved: true, isNew: true };
  }

  // released before the page came off -> snap back, no note
  function cancelCurl() {
    if (!peelCurl) return;
    try { board.releasePointerCapture(peelCurl.pointerId); } catch (_) {}
    setPadColor(peelCurl.color); // restore the pad colour (nothing was peeled)
    peelCurl.el.remove();
    peelCurl = null;
  }

  /* ---------- threads ---------- */
  function anchor(n) {
    // tie the string to the pin: top-centre of the note (height-independent)
    return { x: n.x + NOTE / 2, y: n.y };
  }

  // control point for the resting string: sags below the midpoint by some gravity
  function controlPoint(ax, ay, bx, by) {
    const dist = Math.hypot(bx - ax, by - ay);
    const sag = clamp(dist * 0.18, 16, 90);
    return { x: (ax + bx) / 2, y: (ay + by) / 2 + sag };
  }

  // a quadratic curve with a little gravity (the visible, full-length string)
  function curve(ax, ay, bx, by) {
    const c = controlPoint(ax, ay, bx, by);
    return "M " + ax + " " + ay + " Q " + c.x + " " + c.y + " " + bx + " " + by;
  }

  // the clickable "grab" region: only the MIDDLE of the string, so the endpoints
  // (which sit on the pins) never intercept clicks and can't be used to break it
  function hitPathD(ax, ay, bx, by) {
    const c = controlPoint(ax, ay, bx, by);
    const T0 = 0.18, T1 = 0.82, STEPS = 12;
    let d = "";
    for (let i = 0; i <= STEPS; i++) {
      const t = T0 + (T1 - T0) * (i / STEPS);
      const u = 1 - t;
      const x = u * u * ax + 2 * u * t * c.x + t * t * bx;
      const y = u * u * ay + 2 * u * t * c.y + t * t * by;
      d += (i === 0 ? "M " : "L ") + x + " " + y + " ";
    }
    return d.trim();
  }

  // a quadratic whose curve passes through point P at its midpoint (for pulling)
  function curveThrough(ax, ay, bx, by, px, py) {
    const cx = 2 * px - (ax + bx) / 2;
    const cy = 2 * py - (ay + by) / 2;
    return "M " + ax + " " + ay + " Q " + cx + " " + cy + " " + bx + " " + by;
  }

  function findThreadBetween(a, b) {
    return threads.find(function (t) {
      return (t.a === a && t.b === b) || (t.a === b && t.b === a);
    });
  }

  function makeThreadEl(t) {
    const hit = document.createElementNS(SVGNS, "path");
    hit.setAttribute("class", "thread-hit");
    hit.dataset.threadId = t.id;
    const tip = document.createElementNS(SVGNS, "title");
    tip.textContent = "Pull to break";
    hit.appendChild(tip);

    const vis = document.createElementNS(SVGNS, "path");
    vis.setAttribute("class", "thread");

    threadSvg.appendChild(hit);
    threadSvg.appendChild(vis); // visible path is the next sibling (for the hover rule)
    threadEls.set(t.id, { hit: hit, vis: vis });
    positionThread(t);
  }

  function positionThread(t) {
    const pair = threadEls.get(t.id);
    if (!pair) return;
    const na = notes.find(x => x.id === t.a);
    const nb = notes.find(x => x.id === t.b);
    if (!na || !nb) { pair.hit.style.display = "none"; pair.vis.style.display = "none"; return; }
    pair.hit.style.display = "";
    pair.vis.style.display = "";
    const a = anchor(na), b = anchor(nb);
    pair.vis.setAttribute("d", curve(a.x, a.y, b.x, b.y));        // full string
    pair.hit.setAttribute("d", hitPathD(a.x, a.y, b.x, b.y));     // grabbable middle only
    pair.vis.style.opacity = "";
    pair.vis.style.strokeWidth = "";
  }

  function positionAllThreads() {
    threads.forEach(positionThread);
  }

  function positionThreadsFor(noteId) {
    threads.forEach(function (t) {
      if (t.a === noteId || t.b === noteId) positionThread(t);
    });
  }

  function addThread(a, b) {
    const t = { id: uid(), a: a, b: b };
    threads.push(t);
    makeThreadEl(t);
    API.upsertThread(t);
  }

  function removeThreadLocal(id, alsoRemote) {
    const i = threads.findIndex(x => x.id === id);
    if (i === -1) return;
    threads.splice(i, 1);
    const pair = threadEls.get(id);
    if (pair) { pair.hit.remove(); pair.vis.remove(); }
    threadEls.delete(id);
    if (alsoRemote) API.removeThread(id);
  }

  /* ---------- pulling a string to break it ---------- */
  function startPull(id, e) {
    const t = threads.find(x => x.id === id);
    if (!t) return;
    e.preventDefault();
    pull = { id: id, pointerId: e.pointerId };
    board.classList.add("pulling");
    try { board.setPointerCapture(e.pointerId); } catch (_) {}
    updatePull(e);
  }

  function updatePull(e) {
    const t = threads.find(x => x.id === pull.id);
    const pair = threadEls.get(pull.id);
    if (!t || !pair) return;
    const na = notes.find(x => x.id === t.a);
    const nb = notes.find(x => x.id === t.b);
    if (!na || !nb) return;
    const a = anchor(na), b = anchor(nb);
    const r = board.getBoundingClientRect();
    const px = e.clientX - r.left;
    const py = e.clientY - r.top;

    const d = curveThrough(a.x, a.y, b.x, b.y, px, py);
    pair.hit.setAttribute("d", d);
    pair.vis.setAttribute("d", d);

    // how far have we pulled the string off its resting midpoint?
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const stretch = Math.hypot(px - mx, py - my);
    const tension = clamp(stretch / BREAK_PULL, 0, 1);
    pair.vis.style.opacity = String(0.85 + 0.15 * tension);
    pair.vis.style.strokeWidth = String(2 - tension * 0.9); // thins as it stretches

    if (stretch > BREAK_PULL) finishPull(true);
  }

  function finishPull(broke) {
    const id = pull.id;
    try { board.releasePointerCapture(pull.pointerId); } catch (_) {}
    board.classList.remove("pulling");
    pull = null;
    if (broke) {
      removeThreadLocal(id, true);
      return;
    }
    // released early -> spring back to rest
    const t = threads.find(x => x.id === id);
    if (t) positionThread(t);
  }

  /* ---------- linking: drag the handle onto another note ---------- */
  function startLink(n, e) {
    e.preventDefault();
    link = { fromId: n.id, pointerId: e.pointerId };
    linkTarget = null;
    board.classList.add("linking");
    try { board.setPointerCapture(e.pointerId); } catch (_) {}
    linkTempEl = document.createElementNS(SVGNS, "path");
    linkTempEl.setAttribute("class", "thread thread-temp");
    threadSvg.appendChild(linkTempEl);
    updateLink(e);
  }

  function updateLink(e) {
    const from = notes.find(x => x.id === link.fromId);
    if (!from) return;
    const a = anchor(from);
    const r = board.getBoundingClientRect();
    const px = e.clientX - r.left;
    const py = e.clientY - r.top;
    linkTempEl.setAttribute("d", curve(a.x, a.y, px, py));

    // which note is under the cursor?
    const hovered = document.elementFromPoint(e.clientX, e.clientY);
    const noteEl = hovered && hovered.closest ? hovered.closest(".note") : null;
    let tgt = noteEl ? noteEl.dataset.id : null;
    if (tgt === link.fromId) tgt = null;
    setLinkTarget(tgt);
  }

  function setLinkTarget(id) {
    if (linkTarget && els.has(linkTarget)) els.get(linkTarget).classList.remove("link-target");
    linkTarget = id;
    if (id && els.has(id)) els.get(id).classList.add("link-target");
  }

  function endLink() {
    const fromId = link.fromId;
    const tgt = linkTarget;
    if (linkTempEl) { linkTempEl.remove(); linkTempEl = null; }
    setLinkTarget(null);
    try { board.releasePointerCapture(link.pointerId); } catch (_) {}
    board.classList.remove("linking");
    link = null;
    if (tgt && tgt !== fromId && !findThreadBetween(fromId, tgt)) addThread(fromId, tgt);
  }

  /* ---------- pointer interactions ---------- */
  board.addEventListener("pointerdown", function (e) {
    // pull a string to break it
    const hit = e.target.closest && e.target.closest(".thread-hit");
    if (hit) { startPull(hit.dataset.threadId, e); return; }

    // press the pad to arm a peel (a note comes off only when you pull away)
    if (e.target.closest(".pad")) { armPeel(e); return; }

    const el = e.target.closest(".note");

    // clicked empty board -> deselect
    if (!el) { select(null); stopEdit(); return; }

    const id = el.dataset.id;
    const n = notes.find(x => x.id === id);
    if (!n) return;

    // pin -> start a thread; clicking anywhere else on the note moves it
    if (e.target.closest(".pin")) {
      select(id);
      bringToFront(n, el);
      startLink(n, e);
      return;
    }

    // toolbar actions
    const swatch = e.target.closest(".swatch");
    if (swatch) { recolor(n, el, swatch.dataset.color); return; }
    if (e.target.closest(".tool-front")) { bringToFront(n, el); API.upsert(n); return; }
    if (e.target.closest(".tool-back")) { sendToBack(n, el); return; }
    if (e.target.closest(".tool-del")) { deleteNote(id); return; }

    select(id);
    bringToFront(n, el);

    if (editingId === id) return;

    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    el.classList.add("dragging");
    applyTransform(el, n, true);
    drag = { id: id, el: el, n: n, startX: e.clientX, startY: e.clientY, baseX: n.x, baseY: n.y, moved: false, isNew: false };
  });

  board.addEventListener("pointermove", function (e) {
    if (pull) { updatePull(e); return; }
    if (link) { updateLink(e); return; }
    if (padPeel) {
      const pdx = e.clientX - padPeel.startX;
      const pdy = e.clientY - padPeel.startY;
      if (Math.hypot(pdx, pdy) <= 8) return; // not pulled far enough to start the turn
      const sx = padPeel.startX, sy = padPeel.startY;
      try { pad.releasePointerCapture(padPeel.pointerId); } catch (_) {}
      padPeel = null;
      startCurl(e, sx, sy);
      return;
    }
    if (peelCurl) {
      if (!updateCurl(e)) return; // still turning the page
      // committed -> `drag` is now set; fall through to position the note
    }
    if (!drag) return;
    const dx = e.clientX - drag.startX;
    const dy = e.clientY - drag.startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
    drag.n.x = drag.baseX + dx;
    drag.n.y = drag.baseY + dy;
    clampNote(drag.n);
    applyTransform(drag.el, drag.n, true);
    positionThreadsFor(drag.id);
  });

  function endDrag(e) {
    if (!drag) return;
    const d = drag; drag = null;
    d.el.classList.remove("dragging");
    applyTransform(d.el, d.n, false);
    positionThreadsFor(d.id);
    try { d.el.releasePointerCapture(e.pointerId); } catch (_) {}
    if (d.moved || d.isNew) API.upsert(d.n);
    if (d.isNew) {
      const el = els.get(d.id);
      if (el) startEdit(d.n, el); // a freshly peeled note opens for typing
    }
  }

  board.addEventListener("pointerup", function (e) {
    if (pull) { finishPull(false); return; }
    if (link) { endLink(); return; }
    if (peelCurl) { cancelCurl(); return; }  // let go mid-turn -> snap back, no note
    if (padPeel) { cancelPeel(); return; }    // pressed but never pulled -> no note
    endDrag(e);
  });
  board.addEventListener("pointercancel", function (e) {
    if (pull) { finishPull(false); return; }
    if (link) { endLink(); return; }
    if (peelCurl) { cancelCurl(); return; }
    if (padPeel) { cancelPeel(); return; }
    endDrag(e);
  });

  /* ---------- editing triggers ---------- */
  board.addEventListener("dblclick", function (e) {
    if (e.target.closest(".pad")) return;
    const el = e.target.closest(".note");
    if (el) {
      const n = notes.find(x => x.id === el.dataset.id);
      if (n) { select(n.id); startEdit(n, el); }
    } else {
      const r = board.getBoundingClientRect();
      addNoteAt(e.clientX - r.left, e.clientY - r.top);
    }
  });

  board.addEventListener("input", function (e) {
    if (e.target.tagName === "TEXTAREA") autoGrow(e.target);
  });

  board.addEventListener("focusout", function (e) {
    if (e.target.tagName === "TEXTAREA") stopEdit();
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (pull) { finishPull(false); return; }            // give up the pull, keep the string
      if (link) { setLinkTarget(null); endLink(); return; } // cancel an in-progress string
      if (editingId) { stopEdit(); return; }
    }
    if ((e.key === "Delete" || e.key === "Backspace") && selectedId && !editingId) {
      e.preventDefault();
      deleteNote(selectedId);
    }
  });

  window.addEventListener("resize", function () {
    notes.forEach(function (n) {
      clampNote(n);
      const el = els.get(n.id);
      if (el && (!drag || drag.id !== n.id)) applyTransform(el, n, false);
    });
    positionAllThreads();
  });

  /* ---------- init ---------- */
  (async function init() {
    nextColor = randomColor();
    setPadColor(nextColor); // the pad shows the colour of the next note to peel

    try {
      notes = await API.list();
    } catch (e) {
      console.error(e);
      empty.querySelector(".big").textContent = "Couldn't reach the server";
      empty.querySelector(".small").textContent = "The board can't load right now — try refreshing.";
      empty.style.display = "flex";
      return;
    }
    maxZ = notes.reduce((m, n) => Math.max(m, n.z || 1), 1);
    notes.forEach(function (n) {
      if (typeof n.rot !== "number") n.rot = Math.random() * 8 - 4;
      clampNote(n);
      makeEl(n);
    });
    updateChrome();

    // threads are best-effort: if the API isn't deployed yet, just skip them
    try {
      threads = await API.listThreads();
    } catch (e) {
      console.error(e);
      threads = [];
    }
    threads = threads.filter(function (t) {
      return els.has(t.a) && els.has(t.b);
    });
    threads.forEach(makeThreadEl);
  })();
})();
</script>
</body>
</html>
